# Terraform Provider release workflow.
name: Release

# This GitHub action creates a release when a tag that matches the pattern
# "v*" (e.g. v0.1.0) is created.
on:
  push:
    branches:
      - main
    tags:
      - "v*"

# Releases need permissions to read and write the repository contents.
# GitHub considers creating releases and uploading assets as writing contents.
permissions:
  contents: write
  id-token: write # Required for ko to push images to ghcr.io
  pull-requests: write # Required for goreleaser to create a PR with the changelog.
  issues: write # Required for goreleaser to create an issue with the changelog.
  packages: write # Required for goreleaser to push images to ghcr.io.

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Allow goreleaser to access older tag information.
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "go.mod"
          cache: true
      - uses: ko-build/setup-ko@61b4d1d396f5b2e7d6bb6fefdce3dc38d1a13445 # v0.10
        env:
          KO_DOCKER_REPO: ${{github.repository}}
          KO_DEFAULTBASEIMAGE: docker.io/chainguard/static:latest
      - name: Run ko build
        if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
        run: |-
          ko login ghcr.io -u ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }}
          ko build ./cmd/metal-boot --platform=all --bare --push
      - name: Run GoReleaser
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
